stages:
  - build
  - deploy

variables:
  NODE_VERSION: "18"

cache:
  paths:
    - node_modules/

build:
  stage: build
  image: node:18-alpine
  script:
    - npm ci
    - npm run build:prod
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  only:
    - main
    - master

deploy-render:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - curl -X POST $RENDER_DEPLOY_HOOK
  only:
    - main
    - master
  needs:
    - build

deploy-docker:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $DOCKER_USERNAME -p $DOCKER_TOKEN
  script:
    - docker build -t $DOCKER_USERNAME/softmali:latest .
    - docker tag $DOCKER_USERNAME/softmali:latest $DOCKER_USERNAME/softmali:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_USERNAME/softmali:latest
    - docker push $DOCKER_USERNAME/softmali:$CI_COMMIT_SHORT_SHA
  only:
    - main
    - master
  needs:
    - build
