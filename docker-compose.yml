version: '3.8'

services:
  softmali-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: softmali-app
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - softmali-network

networks:
  softmali-network:
    driver: bridge
